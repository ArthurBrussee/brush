on:
  pull_request:
  push:
    branches: ["main"]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt-crank-check:
    name: Format + check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev # libgtk-3-dev is used by rfd
          version: 1.0
          execute_install_scripts: true

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-workspace-crates: true

      - name: check --all-features
        run: cargo check --locked --workspace --all-features --all-targets

      - name: check --no-default-features
        run: cargo check --locked --workspace --no-default-features --all-targets

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --workspace --document-private-items --no-deps --all-features

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  test_wasm:
    name: Run wasm tests (headless Chrome)
    # Linux + latest Mesa Lavapipe via kisak's PPA. Stock ubuntu-24.04
    # ships Mesa 24.0; the PPA bumps to 25.x which has materially
    # better software coverage of `shader-f16`, `timestamp-query`, and
    # subgroup ops — exactly the features WebGPU on Chrome needs.
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown

      - name: Install latest Mesa + Lavapipe (kisak/turtle)
        # Stock Ubuntu Mesa is too old to expose enough Vulkan features
        # for Chrome WebGPU. The kisak/turtle PPA tracks the latest
        # released Mesa, which gives Lavapipe good coverage of
        # shader-float16/int8, timestamp queries, and compute subgroups.
        run: |
          sudo add-apt-repository -y ppa:kisak/turtle
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            libvulkan1 \
            vulkan-tools \
            libegl1 \
            libgles2
          echo "::group::dpkg -l | mesa-vulkan-drivers"
          dpkg -l mesa-vulkan-drivers | tail -1
          echo "::endgroup::"
          echo "::group::vulkaninfo --summary"
          vulkaninfo --summary || true
          echo "::endgroup::"
          # Full feature dump (greppable later for shaderFloat16,
          # timestampPeriod, subgroupSupportedOperations, etc.).
          echo "::group::vulkaninfo (full)"
          vulkaninfo 2>&1 | head -400 || true
          echo "::endgroup::"

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install matching chromedriver via chromedriver-autoinstaller
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --user --break-system-packages \
            chromedriver-autoinstaller
          export PATH="$(dirname "$CHROME_BIN"):$PATH"
          DRIVER_PATH="$(python3 -c 'import chromedriver_autoinstaller; print(chromedriver_autoinstaller.install())' | tail -n1)"
          echo "Installed chromedriver at: $DRIVER_PATH"
          "$DRIVER_PATH" --version
          # Wrap chromedriver so wasm-bindgen-test invokes it with
          # --verbose --log-path; the runner captures stdout, this
          # captures the rest (including any spawned Chrome stderr).
          mkdir -p "$RUNNER_TEMP/wrappers"
          WRAPPER="$RUNNER_TEMP/wrappers/chromedriver"
          cat > "$WRAPPER" <<EOF
          #!/usr/bin/env bash
          exec "$DRIVER_PATH" --verbose --log-path="$RUNNER_TEMP/chromedriver.log" "\$@"
          EOF
          chmod +x "$WRAPPER"
          echo "CHROMEDRIVER=$WRAPPER" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_LOG=$RUNNER_TEMP/chromedriver.log" >> "$GITHUB_ENV"

      - name: Report versions
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          "$CHROME_BIN" --version
          "$CHROMEDRIVER" --version

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true
          # Save the cache even when tests fail. Without this, a streak
          # of failing runs slowly invalidates the cache (cache only
          # restores, never refreshes), and every later run rebuilds
          # workspace crates from a stale base.
          cache-on-failure: true

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.108

      - name: Run brush-bench-test in headless Chrome
        env:
          RUSTFLAGS: --cfg=getrandom_backend="wasm_js"
        run: cargo test -p brush-bench-test --target wasm32-unknown-unknown

      - name: Dump chromedriver verbose log
        if: always()
        run: |
          if [ -f "$CHROMEDRIVER_LOG" ]; then
            echo "::group::chromedriver.log"
            cat "$CHROMEDRIVER_LOG"
            echo "::endgroup::"
          else
            echo "no chromedriver log at $CHROMEDRIVER_LOG"
          fi

  # ---------------------------------------------------------------------------

  cargo-deny:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: aarch64-linux-android
          - target: wasm32-unknown-unknown
          - target: x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-musl

    name: cargo-deny ${{ matrix.target }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.92.0"
          log-level: error
          command: check
          arguments: --target  ${{ matrix.target }}

  # ---------------------------------------------------------------------------

  tests:
    name: Run tests
    # We run the tests on macOS because it will run with an actual GPU
    runs-on: namespace-profile-macos
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true
          # Save the cache even when tests fail. Without this, a streak
          # of failing runs slowly invalidates the cache (cache only
          # restores, never refreshes), and every later run rebuilds
          # workspace crates from a stale base.
          cache-on-failure: true

      - name: Run tests
        run: cargo test --all --all-features

      - name: Run doc-tests
        run: cargo test --all --all-features --doc
