on:
  pull_request:
  push:
    branches: ["main"]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt-crank-check:
    name: Format + check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev # libgtk-3-dev is used by rfd
          version: 1.0
          execute_install_scripts: true

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-workspace-crates: true

      - name: check --all-features
        run: cargo check --locked --workspace --all-features --all-targets

      - name: check --no-default-features
        run: cargo check --locked --workspace --no-default-features --all-targets

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --workspace --document-private-items --no-deps --all-features

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  test_wasm:
    name: Run wasm tests (headless Chrome)
    # macOS runner so Chrome WebGPU has a real Metal-backed GPU. The
    # Linux runners only offer software Vulkan (Lavapipe), which doesn't
    # expose `shader-f16` and brush shaders need it.
    runs-on: namespace-profile-macos
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown

      - name: Install Chrome (Chrome for Testing channel)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install chromedriver matched to installed Chrome
        # Auto-detects the installed Chrome's version and downloads the
        # exact matching chromedriver from the Chrome-for-Testing CDN.
        # Avoids the major-version drift we hit when Chrome is "stable"
        # but chromedriver came from somewhere else.
        uses: nanasess/setup-chromedriver@v2

      - name: Report versions
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          "$CHROME_BIN" --version
          which chromedriver
          chromedriver --version
          echo "CHROMEDRIVER=$(command -v chromedriver)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.108

      - name: Run brush-bench-test in headless Chrome
        env:
          RUSTFLAGS: --cfg=getrandom_backend="wasm_js"
        run: cargo test -p brush-bench-test --target wasm32-unknown-unknown

  # ---------------------------------------------------------------------------

  cargo-deny:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: aarch64-linux-android
          - target: wasm32-unknown-unknown
          - target: x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-musl

    name: cargo-deny ${{ matrix.target }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.92.0"
          log-level: error
          command: check
          arguments: --target  ${{ matrix.target }}

  # ---------------------------------------------------------------------------

  tests:
    name: Run tests
    # We run the tests on macOS because it will run with an actual GPU
    runs-on: namespace-profile-macos
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true

      - name: Run tests
        run: cargo test --all --all-features

      - name: Run doc-tests
        run: cargo test --all --all-features --doc
