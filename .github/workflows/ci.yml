on:
  pull_request:
  push:
    branches: ["main"]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt-crank-check:
    name: Format + check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev # libgtk-3-dev is used by rfd
          version: 1.0
          execute_install_scripts: true

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-workspace-crates: true

      - name: check --all-features
        run: cargo check --locked --workspace --all-features --all-targets

      - name: check --no-default-features
        run: cargo check --locked --workspace --no-default-features --all-targets

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --workspace --document-private-items --no-deps --all-features

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  test_wasm:
    name: Run wasm tests (headless Chrome)
    # macOS runner so Chrome WebGPU has a real Metal-backed GPU. The
    # Linux runners only offer software Vulkan (Lavapipe), which doesn't
    # expose `shader-f16` and brush shaders need it.
    runs-on: namespace-profile-macos
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install matching chromedriver via chromedriver-autoinstaller
        # Python helper that detects the installed Chrome's exact build
        # and downloads the matching chromedriver. Avoids the
        # major-version drift a generic "stable chromedriver" install
        # can introduce.
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          # CI macOS uses Homebrew's Python which is PEP 668-locked.
          # --break-system-packages is fine here since the runner is
          # disposable.
          python3 -m pip install --quiet --user --break-system-packages \
            chromedriver-autoinstaller
          # The package looks at $PATH for chrome; point it at the
          # binary setup-chrome installed.
          export PATH="$(dirname "$CHROME_BIN"):$PATH"
          # The package logs to stdout alongside printing the path, so
          # take only the last line (the actual path).
          DRIVER_PATH="$(python3 -c 'import chromedriver_autoinstaller; print(chromedriver_autoinstaller.install())' | tail -n1)"
          echo "Installed chromedriver at: $DRIVER_PATH"
          ls -la "$DRIVER_PATH"
          "$DRIVER_PATH" --version
          # Wrap chromedriver so wasm-bindgen-test invocation runs it
          # with --verbose --log-path so we get real Chrome stderr
          # captured when it dies. wasm-bindgen-test-runner doesn't let
          # us pass args to chromedriver, so we sneak them in via a
          # wrapper script invoked through CHROMEDRIVER.
          mkdir -p "$RUNNER_TEMP/wrappers"
          WRAPPER="$RUNNER_TEMP/wrappers/chromedriver"
          cat > "$WRAPPER" <<EOF
          #!/usr/bin/env bash
          exec "$DRIVER_PATH" --verbose --log-path="$RUNNER_TEMP/chromedriver.log" "\$@"
          EOF
          chmod +x "$WRAPPER"
          echo "CHROMEDRIVER=$WRAPPER" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_LOG=$RUNNER_TEMP/chromedriver.log" >> "$GITHUB_ENV"

      - name: Report versions
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          "$CHROME_BIN" --version
          "$CHROMEDRIVER" --version

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true
          # Save the cache even when tests fail. Without this, a streak
          # of failing runs slowly invalidates the cache (cache only
          # restores, never refreshes), and every later run rebuilds
          # workspace crates from a stale base.
          cache-on-failure: true

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.108

      - name: Run brush-bench-test in headless Chrome
        env:
          RUSTFLAGS: --cfg=getrandom_backend="wasm_js"
        run: cargo test -p brush-bench-test --target wasm32-unknown-unknown

      - name: Dump chromedriver verbose log
        if: always()
        run: |
          if [ -f "$CHROMEDRIVER_LOG" ]; then
            echo "::group::chromedriver.log"
            cat "$CHROMEDRIVER_LOG"
            echo "::endgroup::"
          else
            echo "no chromedriver log at $CHROMEDRIVER_LOG"
          fi
          echo "::group::Chrome crash dumps (~/Library/Logs/DiagnosticReports)"
          ls -la ~/Library/Logs/DiagnosticReports 2>/dev/null || true
          for f in ~/Library/Logs/DiagnosticReports/Chrom* ~/Library/Logs/DiagnosticReports/Google* 2>/dev/null; do
            [ -f "$f" ] && { echo "--- $f ---"; cat "$f"; }
          done
          echo "::endgroup::"

  # ---------------------------------------------------------------------------

  cargo-deny:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: aarch64-linux-android
          - target: wasm32-unknown-unknown
          - target: x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-musl

    name: cargo-deny ${{ matrix.target }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.92.0"
          log-level: error
          command: check
          arguments: --target  ${{ matrix.target }}

  # ---------------------------------------------------------------------------

  tests:
    name: Run tests
    # We run the tests on macOS because it will run with an actual GPU
    runs-on: namespace-profile-macos
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true
          # Save the cache even when tests fail. Without this, a streak
          # of failing runs slowly invalidates the cache (cache only
          # restores, never refreshes), and every later run rebuilds
          # workspace crates from a stale base.
          cache-on-failure: true

      - name: Run tests
        run: cargo test --all --all-features

      - name: Run doc-tests
        run: cargo test --all --all-features --doc
